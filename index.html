<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Divine Space Construction | Luxury & Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; overflow-x: hidden; background-color: #ffffff; }
      h1, h2, h3, .brand-font { font-family: 'Playfair Display', serif; }
      
      .bg-royal-blue { background-color: #E31E24; }
      .text-royal-blue { color: #E31E24; }
      .border-royal-blue { border-color: #E31E24; }
      
      .bg-brand-black { background-color: #111111; }
      .text-brand-black { color: #111111; }
      
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #f1f1f1; }
      ::-webkit-scrollbar-thumb { background: #E31E24; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #b2171c; }

      /* Prevent FOUC and ensure root is visible */
      #root { min-height: 100vh; display: flex; flex-direction: column; }
    </style>
    <script>
      // Global process shim for browser compatibility - Vite will replace process.env.GEMINI_API_KEY during build
      window.process = window.process || { env: {} };
    </script>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/": "https://esm.sh/react@18.3.1/",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/": "https://esm.sh/react-dom@18.3.1/",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0?deps=react@18.3.1,react-dom@18.3.1",
    "@google/genai": "https://esm.sh/@google/genai@1.34.0",
    "framer-motion": "https://esm.sh/framer-motion@11.11.11?deps=react@18.3.1,react-dom@18.3.1",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.1",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
  </head>

    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
  </body>
</html>
